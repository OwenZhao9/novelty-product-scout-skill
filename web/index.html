<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Novelty Product Scout</title>
    <link rel="stylesheet" href="styles.css?v=20260514-9">
  </head>
  <body>
    <main class="app-shell">
      <section class="input-panel">
        <div class="brand-row">
          <div>
            <p class="eyebrow">E-commerce Skill</p>
            <h1>新奇特选品雷达</h1>
            <p class="tagline">整合趋势、内容广告、竞品、供应链和社区痛点评分</p>
            <p class="source-status" id="sourceStatus">正在检查数据源...</p>
          </div>
          <span class="status-pill" id="statusPill">Ready</span>
        </div>

        <form id="scoutForm" class="form-grid">
          <label>
            市场
            <input name="market" value="泰国" list="marketOptions" autocomplete="off">
          </label>
          <label>
            平台
            <input name="platform" value="TikTok 小店" list="platformOptions" autocomplete="off">
          </label>
          <input type="hidden" name="data_source_mode" value="public">
          <label>
            人群
            <span class="unlimited-row"><input type="checkbox" class="unlimited-toggle" data-target="audience"> 不限</span>
            <input name="audience" value="养猫人群" list="audienceOptions" autocomplete="off">
            <select class="preset-select" data-fill="audience" aria-label="推荐人群">
              <option value="">选择推荐人群...</option>
            </select>
          </label>
          <label>
            类目
            <span class="unlimited-row"><input type="checkbox" class="unlimited-toggle" data-target="category"> 不限</span>
            <input name="category" value="宠物用品" list="categoryOptions" autocomplete="off">
            <select class="preset-select" data-fill="category" aria-label="推荐类目">
              <option value="">选择推荐类目...</option>
            </select>
          </label>
          <div class="price-range-group">
            <span class="field-title">价格带</span>
            <input type="hidden" name="price_range" value="">
            <div class="price-range-fields">
              <label>
                最低值
                <input name="price_min" value="0" inputmode="decimal" autocomplete="off">
              </label>
              <label>
                最高值
                <input name="price_max" value="无限大" inputmode="decimal" autocomplete="off">
              </label>
            </div>
          </div>
          <label>
            货币单位
            <select name="currency">
              <option value="THB" selected>泰铢</option>
              <option value="CNY">人民币</option>
              <option value="VND">越南盾</option>
              <option value="SGD">新加坡元</option>
              <option value="USD">美元</option>
              <option value="PHP">菲律宾比索</option>
              <option value="MYR">马来西亚林吉特</option>
            </select>
          </label>
          <label>
            榜单模式
            <select name="ranking_mode">
              <option value="hot_sales">热销潜力榜</option>
              <option value="hot_push">热推潜力榜</option>
              <option value="content_viral">内容传播榜</option>
              <option value="category_opportunity">类目机会榜</option>
              <option value="low_risk">低风险测试榜</option>
            </select>
          </label>
          <label>
            周期
            <select name="cycle">
              <option value="week">周榜</option>
              <option value="day">天榜</option>
              <option value="month">月榜</option>
            </select>
          </label>
          <label>
            采集深度
            <select name="limit">
              <option value="3">标准：每源 3 条</option>
              <option value="5">更深：每源 5 条</option>
              <option value="1">快速：每源 1 条</option>
            </select>
          </label>
          <fieldset class="wide source-grid">
            <legend>采集源</legend>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="tiktok" checked>TikTok 小店</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="tiktok_creative" checked>TikTok Creative Center</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="google_trends" checked>Google Trends</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="meta_ads" checked>Meta 广告库</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="pinterest_trends" checked>Pinterest Trends</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="amazon" checked>亚马逊</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="amazon_movers" checked>Amazon 飙升榜</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="shopee" checked>Shopee 泰国</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="lazada" checked>Lazada 泰国</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="aliexpress" checked>速卖通</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="1688" checked>1688/阿里巴巴</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="alibaba" checked>Alibaba 国际站</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="creator" checked>达人/联盟</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="problem" checked>痛点搜索</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="reddit" checked>Reddit</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="quora" checked>Quora</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="pantip" checked>Pantip 泰国社区</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="youtube" checked>YouTube</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="xiaohongshu" checked>小红书</label>
            <label class="checkbox-row"><input type="checkbox" name="data_sources" value="douyin">抖音</label>
          </fieldset>
          <label class="wide">
            偏好
            <textarea name="preferences" rows="2">轻小件, 视觉演示强, 合规风险低, 容易找货源</textarea>
          </label>
          <label class="wide">
            种子关键词
            <textarea name="seed_keywords" rows="3">cat grooming brush, pet hair remover, cat window hammock, interactive cat toy</textarea>
          </label>
          <div class="button-row wide">
            <button type="button" class="secondary-button" id="exampleButton">一键示例</button>
            <button type="button" class="secondary-button" id="clearButton">清空</button>
          </div>
          <button type="submit" id="runButton">开始选品分析</button>

            <option value="美国">
            <option value="英国">
            <option value="欧盟">

            <option value="独立站">
            <option value="Temu">

      </section>

      <section class="results-panel">
        <div class="summary-strip">
          <div>
            <span class="metric-label">候选产品</span>
            <strong id="candidateCount">0</strong>
          </div>
          <div>
            <span class="metric-label">最高分</span>
            <strong id="topScore">-</strong>
          </div>
          <div>
            <span class="metric-label">榜单</span>
            <strong id="activeMode">-</strong>
          </div>
          <div>
            <span class="metric-label">高可信</span>
            <strong id="highConfidence">0</strong>
          </div>
          <div>
            <span class="metric-label">报告</span>
            <a id="downloadReport" href="/report.md" target="_blank">查看 Markdown</a>
          </div>
        </div>
        <div class="toolbar">
          <button type="button" class="secondary-button" id="copyReportButton">复制报告</button>
          <button type="button" class="secondary-button" id="exportCsvButton">导出 CSV</button>
        </div>

        <div id="emptyState" class="empty-state">
          输入目标市场和类目，点击开始分析。
        </div>

        <div id="ranking" class="ranking"></div>
        <article id="detail" class="detail-panel hidden"></article>

        <details class="markdown-box">
          <summary>查看 Markdown 原始报告</summary>
          <pre id="markdownReport"></pre>
        </details>
      </section>
